# Example GitHub Actions workflow for auto-reviewing PRs with devtools
#
# Copy this to .github/workflows/ai-review.yml in your project repo.
#
# Prerequisites:
#   1. claude-dev-tools added as git submodule at tools/devtools
#   2. Claude CLI available (npm install -g @anthropic-ai/claude-code)
#   3. ANTHROPIC_API_KEY secret set in GitHub repo settings
#      (or use Claude Max subscription auth — see Claude CLI docs)

name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize]

# Only one review at a time per PR
concurrency:
  group: ai-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  pull-requests: write
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run AI Review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FLAGS="--incremental"

          # On first open, do a full review (not incremental)
          if [[ "${{ github.event.action }}" == "opened" ]]; then
            FLAGS=""
          fi

          bash tools/devtools/bin/review-pr $FLAGS ${{ github.event.pull_request.number }}
